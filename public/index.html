<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket9ja — Retrieve Payment Receipt</title>
  <meta name="description" content="Search for your payment receipt using your Email Address, Receipt ID or Transaction Reference." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Top Navigation -->
  <header class="topnav">
    <div class="topnav__inner">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="24" height="24" rx="7" fill="#16A34A"/>
            <path d="M7 12.5L10.5 16L17 8.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="brand__name">Ticket9ja</span>
      </div>
      <div class="topnav__badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2L4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3z" stroke="#16A34A" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
        Secure Receipt Portal
      </div>
    </div>
  </header>

  <main class="page">

    <!-- Hero -->
    <section class="hero" aria-labelledby="hero-title">
      <h1 id="hero-title">Retrieve Payment Receipt</h1>
      <p class="hero__subtitle">Search for your payment receipt using your Email Address, Receipt ID or Transaction Reference.</p>
    </section>

    <!-- Search Card -->
    <section class="search-card" aria-labelledby="search-title">
      <h2 id="search-title" class="sr-only">Search for a receipt</h2>

      <div class="tabs" role="tablist" aria-label="Search method">
        <button class="tab is-active" id="tab-email" role="tab" aria-selected="true" aria-controls="panel-email" data-method="email" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.7"/>
            <path d="M3.5 6.5L12 13L20.5 6.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Email
        </button>
        <button class="tab" id="tab-receiptId" role="tab" aria-selected="false" aria-controls="panel-receiptId" data-method="receiptId" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M6 3h9l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
            <path d="M9 12h6M9 16h6M9 8h3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
          Receipt ID
        </button>
        <button class="tab" id="tab-reference" role="tab" aria-selected="false" aria-controls="panel-reference" data-method="reference" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="3" y="7" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.7"/>
            <path d="M3 11h18" stroke="currentColor" stroke-width="1.7"/>
            <path d="M7 15h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
          Reference
        </button>
        <span class="tabs__indicator" aria-hidden="true"></span>
      </div>

      <form id="search-form" novalidate>
        <div class="field" id="panel-email" role="tabpanel" aria-labelledby="tab-email">
          <label for="input-email">Email address</label>
          <input type="email" id="input-email" name="email" placeholder="student@email.com" autocomplete="email" />
        </div>

        <div class="field is-hidden" id="panel-receiptId" role="tabpanel" aria-labelledby="tab-receiptId" hidden>
          <label for="input-receiptId">Receipt ID</label>
          <input type="text" id="input-receiptId" name="receiptId" placeholder="RCP-XXXX" autocomplete="off" />
        </div>

        <div class="field is-hidden" id="panel-reference" role="tabpanel" aria-labelledby="tab-reference" hidden>
          <label for="input-reference">Transaction reference</label>
          <input type="text" id="input-reference" name="reference" placeholder="BDP-XXXX" autocomplete="off" />
        </div>

        <p class="field-error" id="field-error" role="alert" hidden></p>

        <button type="submit" class="btn-search" id="btn-search">
          <svg class="btn-search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M20 20L16.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span id="btn-search-label">Search Receipt</span>
          <span class="spinner" id="btn-spinner" hidden></span>
        </button>
      </form>
    </section>

    <!-- Results -->
    <section class="results" id="results" aria-live="polite"></section>

  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite" hidden>
    <span class="toast__icon" id="toast-icon"></span>
    <span class="toast__message" id="toast-message"></span>
  </div>

  <footer class="footer">
    <p><strong>Ticket9ja</strong> · Secure Receipt Portal</p>
    <p class="footer__muted">Powered by Ticket9ja</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
