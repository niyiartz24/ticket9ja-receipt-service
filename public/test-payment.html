<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudPay Test Payment</title>
</head>
<body>

    <h2>BudPay Test Payment</h2>

    <form id="paymentForm">

        <input
            type="text"
            id="name"
            placeholder="Full Name"
            required
        />

        <br><br>

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        />

        <br><br>

        <input
            type="number"
            id="amount"
            placeholder="Amount"
            required
        />

        <br><br>

        <button type="submit">
            Pay
        </button>

    </form>

    <script src="payment.js"></script>

</body>
</html>
